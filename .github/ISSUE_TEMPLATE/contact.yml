name: Contact
description: Send a message. It opens as a public issue — for private matters, email kleinz@cosmophonix.com.
title: "[contact] "
labels: [contact]
body:
  - type: input
    id: who
    attributes:
      label: Who are you
      placeholder: Name, handle or link
    validations:
      required: false
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Pick up a prototype / collaborate
        - Skills pack
        - m1nd
        - Music x AI
        - Other
    validations:
      required: true
  - type: textarea
    id: message
    attributes:
      label: Message
    validations:
      required: true
